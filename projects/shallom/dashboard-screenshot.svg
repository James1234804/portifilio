<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#1b2a3a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#23c06a"/>
      <stop offset="1" stop-color="#0fb36b"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="700" fill="url(#g1)" rx="12"/>

  <!-- header -->
  <rect x="28" y="28" width="1144" height="72" rx="8" fill="#0f1724" opacity="0.9"/>
  <circle cx="80" cy="64" r="18" fill="#2b85d6" opacity="0.95"/>
  <rect x="116" y="46" width="220" height="12" rx="6" fill="#cfeee0" opacity="0.95"/>

  <!-- left navigation -->
  <rect x="28" y="118" width="180" height="520" rx="8" fill="#0b1220" opacity="0.9"/>
  <rect x="48" y="140" width="120" height="12" rx="6" fill="#1f2937"/>
  <rect x="48" y="170" width="120" height="12" rx="6" fill="#1f2937"/>
  <rect x="48" y="200" width="120" height="12" rx="6" fill="#1f2937"/>
  <rect x="48" y="230" width="120" height="12" rx="6" fill="#1f2937"/>

  <!-- main content cards -->
  <rect x="228" y="118" width="944" height="140" rx="10" fill="#071127" opacity="0.85" stroke="#142238"/>
  <rect x="248" y="144" width="140" height="68" rx="6" fill="#0b9d7a" opacity="0.12"/>
  <rect x="406" y="144" width="140" height="68" rx="6" fill="#23c06a" opacity="0.08"/>
  <rect x="564" y="144" width="140" height="68" rx="6" fill="#2b85d6" opacity="0.06"/>

  <!-- chart area -->
  <rect x="228" y="278" width="584" height="360" rx="10" fill="#071127" opacity="0.9" stroke="#112033"/>
  <!-- bars -->
  <g transform="translate(260,320)">
    <rect x="0" y="80" width="36" height="140" rx="6" fill="#23c06a"/>
    <rect x="60" y="40" width="36" height="180" rx="6" fill="#2b85d6"/>
    <rect x="120" y="20" width="36" height="200" rx="6" fill="#a34fbf"/>
    <rect x="180" y="70" width="36" height="150" rx="6" fill="#23c06a"/>
    <rect x="240" y="110" width="36" height="110" rx="6" fill="#0fb36b"/>
  </g>

  <!-- details / right side -->
  <rect x="828" y="278" width="344" height="360" rx="10" fill="#071127" opacity="0.9" stroke="#112033"/>
  <rect x="848" y="300" width="80" height="12" rx="6" fill="#9fe9bb"/>
  <rect x="948" y="300" width="140" height="12" rx="6" fill="#cfeee0"/>
  <rect x="848" y="330" width="200" height="12" rx="6" fill="#223246"/>
  <rect x="848" y="360" width="280" height="12" rx="6" fill="#223246"/>

  <!-- footer small charts -->
  <g transform="translate(248,620)">
    <rect x="0" y="0" width="120" height="56" rx="8" fill="#0b1220" opacity="0.9" stroke="#132437"/>
    <rect x="144" y="0" width="120" height="56" rx="8" fill="#0b1220" opacity="0.9" stroke="#132437"/>
    <rect x="288" y="0" width="120" height="56" rx="8" fill="#0b1220" opacity="0.9" stroke="#132437"/>
  </g>

  <!-- subtle sheen to make it feel like a screenshot -->
  <rect x="228" y="118" width="944" height="520" rx="12" fill="url(#g1)" opacity="0.03"/>
</svg>